# docker-compose.traefik.yml — Traefik overlay for consumer projects.
#
# This file is applied on top of the base docker-compose.yml when the hub is
# running. It adds Traefik labels and attaches the service to the shared
# `proxy` network. The variables ${APP_NAME}, ${APP_HOST}, and ${APP_PORT}
# are exported by traefik.mk.
#
# Rename the `app:` key below to match the service name in your base compose
# file.

services:
  app:
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      # Routing hostname:
      # The hub synthesizes `Host(`<container-name>.localhost`)` for every
      # labeled container via the Docker provider's defaultRule. If your
      # compose service / container name already matches the hostname you
      # want, routing just works — no `rule=` label needed here.
      #
      # To override (e.g. custom domain, multiple hostnames), uncomment:
      # - traefik.http.routers.${APP_NAME}.rule=Host(`${APP_HOST}`)
      # The hub serves plain HTTP only (a single `web` entrypoint on :80).
      # Routers without an `entrypoints=` label attach to it automatically,
      # so no entrypoint label is needed here.
      - traefik.http.services.${APP_NAME}.loadbalancer.server.port=${APP_PORT}
    networks:
      - proxy
      - default

networks:
  proxy:
    external: true
