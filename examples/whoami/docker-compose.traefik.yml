# The hub's defaultRule would route this container at
# `whoami-example.localhost` (the container_name). The example keeps an
# explicit Host rule so the documented URL — `whoami.localhost` — stays
# stable regardless of container_name. Your own projects typically won't
# need this; see snippets/docker-compose.traefik.yml.
services:
  whoami:
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.${APP_NAME}.rule=Host(`${APP_HOST}`)
      # No `entrypoints=...` label: the hub has only one entrypoint (`web`
      # on :80) and routers attach to all entrypoints by default.
      - traefik.http.services.${APP_NAME}.loadbalancer.server.port=${APP_PORT}
    networks:
      - proxy
      - default

networks:
  proxy:
    external: true
