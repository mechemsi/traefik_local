services:
  whoami:
    image: traefik/whoami:latest
    container_name: whoami-example
    restart: unless-stopped
    # No `ports:` here. Port publishing belongs to docker-compose.fallback.yml,
    # which traefik.mk layers on only when the hub is down. In routed mode,
    # Traefik reaches the container via the internal `proxy` network — no
    # host port needed.
