# ~/traefik/docker-compose.yml
services:
  traefik:
    image: traefik:v3.6.13
    container_name: traefik
    restart: unless-stopped
    user: "0:0"
    group_add:
      - "1001"
    command:
      # --- Provider: Docker ---
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false   # only route explicitly labeled services
      - --providers.docker.network=proxy             # always use the shared network
      - --providers.docker.defaultRule=Host(`{{ normalize .Name }}.localhost`)
      # --- Provider: File (TLS + dynamic config) ---
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      # --- Entrypoints ---
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      # --- Logs ---
      - --log.level=INFO
      - --accesslog=true
      - --accesslog.format=json
      - --accesslog.filters.statuscodes=400-599
      - --accesslog.filters.minduration=100ms
      # --- Dashboard ---
      - --api.dashboard=true
    ports:
      - "80:80"       # HTTP traffic (redirects to HTTPS)
      - "443:443"     # HTTPS traffic
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./certs:/etc/traefik/certs:ro
    networks:
      - proxy
    labels:
      # Expose the dashboard via Traefik itself at traefik.localhost (BasicAuth-protected)
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.middlewares=dashboard-auth@docker
      - traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$2y$$05$$PLACEHOLDER_REPLACE_ME

networks:
  proxy:
    external: true
