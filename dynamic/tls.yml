# Local default certificate served for any host that doesn't match a more
# specific certificate. Generated by mkcert; see `make certs` and docs/https.md.
tls:
  certificates:
    - certFile: /etc/traefik/certs/localhost.pem
      keyFile: /etc/traefik/certs/localhost-key.pem
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/localhost.pem
        keyFile: /etc/traefik/certs/localhost-key.pem
